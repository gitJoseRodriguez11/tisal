# Base de datos en memoria para pruebas
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# Valores falsos para Azure en tests
azure.ai.openai.endpoint=http://localhost/fake
azure.ai.openai.api-key=fake-key
azure.ai.openai.deployment-name=fake-deployment
azure.ai.openai.embedding-deployment=fake-embedding
